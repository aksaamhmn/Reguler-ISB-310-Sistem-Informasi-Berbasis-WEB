<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Sesi Click Counter</title>
  </head>
  <body>
    <button id="clickBtn">Click me!</button>

    <p id="counterDisplay"></p>

    <p>
      Click the button to see the counter increase. <br />
      Close the browser tab (or window), and try again, and the counter is not
      reset.
    </p>

    <script>
      let saved = localStorage.getItem("angkaSimpanan") || 0;
      clickBtn.onclick = () => {
        localStorage.setItem("angkaSimpanan", ++saved);
        counterDisplay.innerHTML = `You have clicked the button <b>${saved}</b> time(s).`;
      };
    </script>
  </body>
</html>
