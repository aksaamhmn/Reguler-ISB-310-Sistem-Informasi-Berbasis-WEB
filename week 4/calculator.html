<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator - Sistem Informasi ITENAS</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="main-box">
      <div class="header-images">
        <img src="asset/gedung.jpeg" alt="Gedung Itenas" />
        <img src="asset/gedung.jpeg" alt="Gedung Itenas" />
        <img src="asset/gedung.jpeg" alt="Gedung Itenas" />
        <img src="asset/gedung.jpeg" alt="Gedung Itenas" />
        <img src="asset/gedung.jpeg" alt="Gedung Itenas" />
        <img src="asset/gedung.jpeg" alt="Gedung Itenas" />
      </div>

      <div class="body-content">
        <div class="sidebar">
          <a href="index.html">Home</a>
          <a href="menu.html">Menu</a>
          <a href="calculator.html">Calculator</a>
        </div>

        <div class="content-area calc-area">
          <div class="calc-row">
            <input type="number" id="calc-in1" class="calc-input" />
            <select id="calc-op" class="calc-select">
              <option value="*">*</option>
              <option value="/">/</option>
              <option value="+">+</option>
              <option value="-">-</option>
              <option value="%">%</option>
              <option value="^">^</option>
            </select>
            <input type="number" id="calc-in2" class="calc-input" />
            <span class="calc-equals">=</span>
            <input type="text" id="calc-out" class="calc-input" readonly />
          </div>

          <div class="calc-actions">
            <button type="button" id="btn-hitung" class="btn-black">
              Hitung
            </button>
            <button type="button" id="btn-reset-calc" class="btn-black">
              Reset
            </button>
          </div>
        </div>
      </div>

      <div class="footer">
        162023003<br />
        Sistem Informasi | ITENAS 2026
      </div>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
