<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas Preferensi Warna</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 id="judul">Preferensi Warna</h1>

    <fieldset>
      <legend id="teks-legend">Warna</legend>

      <div class="form-group">
        <label for="bgColor">1. Warna Latar Belakang</label>
        <input type="color" id="bgColor" value="#4A699D" />
      </div>

      <div class="form-group">
        <label for="txtColor">2. Warna Teks</label>
        <input type="color" id="txtColor" value="#C92A2A" />
      </div>
    </fieldset>

    <button id="btnSimpan">Simpan</button>

    <script src="script.js"></script>
  </body>
</html>
